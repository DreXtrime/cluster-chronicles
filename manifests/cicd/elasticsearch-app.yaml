apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: elasticsearch
  namespace: cicd
spec:
  project: default
  source:
    repoURL: https://helm.elastic.co
    chart: elasticsearch
    targetRevision: "8.5.1"
    helm:
      values: |
        imageTag: "8.19.3"
        replicas: 1
        minimumMasterNodes: 1
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        persistence:
          enabled: true
          storageClass: standard
        volumeClaimTemplate:
          storageClassName: standard
          resources:
            requests:
              storage: 10Gi
        secret:
          enabled: true
          password: "${ELASTICSEARCH_PASSWORD}"
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true