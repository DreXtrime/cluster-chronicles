apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kibana
  namespace: cicd
spec:
  project: default
  source:
    repoURL: https://helm.elastic.co
    chart: kibana
    targetRevision: "8.5.1"
    helm:
      values: |
        imageTag: "8.5.1"
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        elasticsearchHosts: "https://elasticsearch-master:9200"
        kibanaConfig:
          kibana.yml: |
            elasticsearch.hosts: ["https://elasticsearch-master:9200"]
            elasticsearch.ssl.verificationMode: none
            server.ssl.enabled: false
        extraObjects:
          - apiVersion: batch/v1
            kind: Job
            metadata:
              name: kibana-setup-dataview
              namespace: logging
              annotations:
                argocd.argoproj.io/hook: PostSync
                argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
            spec:
              ttlSecondsAfterFinished: 120
              template:
                spec:
                  restartPolicy: OnFailure
                  containers:
                    - name: create-dataview
                      image: curlimages/curl:latest
                      command:
                        - /bin/sh
                        - -c
                        - |
                          echo "Waiting for Kibana to be ready..."
                          until curl -sk -o /dev/null -w "%{http_code}" http://kibana-kibana:5601/api/status | grep -q "200"; do
                            echo "Kibana not ready yet, waiting..."
                            sleep 10
                          done
                          echo "Kibana is ready, creating data view..."
                          curl -sk -X POST http://kibana-kibana:5601/api/data_views/data_view \
                            -H "kbn-xsrf: true" \
                            -H "Content-Type: application/json" \
                            -d '{
                              "data_view": {
                                "title": "kubernetes-*",
                                "name": "Kubernetes Logs",
                                "timeFieldName": "@timestamp"
                              }
                            }'
                          echo "Done."
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true