apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cluster-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: node-alerts
      rules:
        - alert: NodeCPUHigh
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Node CPU usage exceeds 80%"
            description: "Node {{ $labels.instance }} CPU usage is {{ $value }}%"

        - alert: NodeDiskLow
          expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 20
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Node disk space below 20%"
            description: "Node {{ $labels.instance }} has {{ $value }}% disk space remaining"

        - alert: NodeMemoryHigh
          expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node memory usage exceeds 90%"
            description: "Node {{ $labels.instance }} memory usage is {{ $value }}%"

    - name: pod-alerts
      rules:
        - alert: PodRestartingTooMuch
          expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting too frequently"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has restarted {{ $value }} times in 15 minutes"

        - alert: ContainerMemoryHigh
          expr: (container_memory_usage_bytes{container!=""} / container_spec_memory_limit_bytes{container!=""}) * 100 > 80
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Container memory usage exceeds 80% of limit"
            description: "Container {{ $labels.container }} in pod {{ $labels.pod }} memory usage is {{ $value }}%"

        - alert: PodPending
          expr: kube_pod_status_phase{phase="Pending"} == 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod stuck in pending state"
            description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} has been pending for more than 5 minutes"

    - name: cluster-alerts
      rules:
        - alert: KubernetesAPIServerUnreachable
          expr: absent(up{job="apiserver"} == 1)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Kubernetes API server unreachable"
            description: "The Kubernetes API server has been unreachable for more than 1 minute"