apiVersion: v1
kind: ConfigMap
metadata:
  name: app-performance-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app-dashboard.json: |
    {
      "title": "Application Performance",
      "panels": [
        {
          "title": "HTTP Requests Total",
          "type": "graph",
          "targets": [{"expr": "app_http_requests_total"}]
        },
        {
          "title": "CPU Usage %",
          "type": "gauge",
          "targets": [{"expr": "app_cpu_usage_percent"}]
        },
        {
          "title": "Memory Usage %",
          "type": "gauge",
          "targets": [{"expr": "app_memory_usage_percent"}]
        }
      ]
    }